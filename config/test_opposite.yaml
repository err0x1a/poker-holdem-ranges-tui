title: "BB Defense vs EP (Opposite Test)"
description: "Defense range vs EP open"
tab_ranges:
  - tab: "40+"
    details: |
      BB defense vs EP open at 40BB+
      3-bet and call ranges
    actions:
      - name: call
        title: "Call"
        color: "#FFFFFF"
        hands:
          - AQo
          - AJs
          - ATs
          - KQs
          - KJs
          - QJs
          - JTs
          - T9s
          - 98s
          - 87s
          - 76s
      - name: 3bet
        title: "3-Bet"
        color: "#20bf55"
        hands:
          - AA
          - KK
          - QQ
          - AKs
          - AKo

  - tab: "25-40"
    base: "40+"
    details: |
      BB defense vs EP open at 25-40BB
      Tighter 3-bet, wider call
    actions:
      - name: call
        add_hands: [AQs, KQo]
      - name: 3bet
        remove_hands: [AKo]
      - name: allin
        title: "All-In"
        color: "#FF8A80"
        hands: [AA, KK]

  - tab: "12-25"
    base: "25-40"
    details: |
      BB defense vs EP at 12-25BB
      Push/fold ranges
    actions:
      - name: allin
        add_hands: [QQ, AKs]

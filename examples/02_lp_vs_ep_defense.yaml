title: "Defense EP vs Hero LP: 50BB+"
description: "LP defense vs EP raise, 50BB+"
details: |
  LP vs EP Raise:
  CALL with wide range
  (all pairs, suited hands).

  Still FOLD marginal hands
  like ATo/KJo/QJo.

  POSITION justifies width,
  but requires good
  postflop play.

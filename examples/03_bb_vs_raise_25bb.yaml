title: "BB vs Raise <25BB: Valid Call"
description: "BB call vs raise with less than 25BB"
details: |
  STACK <25BB - BB CALL:
  Valid (pot odds +
  closed action).

  Wide range vs normal
  raiser.

  Vs LOOSE raiser:
  - FOLDS -> SHOVE more
  - CALLS -> CALL more

  Postflop: pair/draw
  -> CHECK/SHOVE.

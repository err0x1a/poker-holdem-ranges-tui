title: "EP: 40BB+ First In"
description: "Open raise range for EP (UTG)"
details: |
  EP (UTG) First In 40+ BBs:
  Tight RAISE (~13%).
  Prefer suited hands and
  high pairs.

  Only limp if the table
  is hyper-passive.

  Use the same raise size
  for all hands in range.
